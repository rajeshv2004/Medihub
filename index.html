<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediHub — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,200&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1a56db;--teal:#0e9f6e;--glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.18);--white:#ffffff;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;overflow:hidden}

/* ── ANIMATED CANVAS BG ── */
body{background:#04152d;position:relative}
canvas{position:fixed;inset:0;z-index:0}

/* ── FLOATING MEDICAL ICONS ── */
.floaters{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.floater{position:absolute;opacity:0;animation:floatUp linear infinite}
.floater svg{display:block}
@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0}
  10%{opacity:.18}
  90%{opacity:.12}
  100%{transform:translateY(-15vh) rotate(360deg);opacity:0}
}

/* ── LAYOUT ── */
.shell{position:relative;z-index:10;height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}

/* ── CARD ── */
.card{
  display:flex;width:100%;max-width:820px;min-height:480px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:24px;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.05) inset;
  animation:cardIn .8s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:none}}

/* ── LEFT BRAND PANEL ── */
.left{
  flex:0 0 320px;
  background:linear-gradient(145deg,rgba(26,86,219,.55) 0%,rgba(14,159,110,.45) 100%);
  border-right:1px solid rgba(255,255,255,.12);
  display:flex;flex-direction:column;justify-content:space-between;padding:2.5rem 2rem;
  position:relative;overflow:hidden;
}
.left::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.brand{position:relative}
.brand-name{font-family:'Fraunces',serif;font-weight:300;font-size:3rem;color:white;line-height:1;letter-spacing:-.02em}
.brand-sub{font-size:.75rem;color:rgba(255,255,255,.6);letter-spacing:.12em;text-transform:uppercase;margin-top:.4rem}
.brand-pulse{width:48px;height:3px;background:rgba(255,255,255,.35);border-radius:2px;margin-top:1rem;position:relative;overflow:hidden}
.brand-pulse::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:white;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%{left:-100%}50%{left:100%}100%{left:100%}}
.tagline{font-size:.875rem;color:rgba(255,255,255,.75);line-height:1.6;position:relative}
.tagline strong{color:white;font-weight:500}

/* ── RIGHT FORM PANEL ── */
.right{flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 2.5rem}
.form-wrap{width:100%;max-width:300px}
.form-title{font-size:1.5rem;font-weight:600;color:white;margin-bottom:.25rem}
.form-hint{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:1.75rem}

.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.7rem;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.45rem}
.field input{
  width:100%;padding:.7rem 1rem;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.15);
  border-radius:10px;font-size:.9rem;
  color:white;font-family:'DM Sans',sans-serif;
  outline:none;transition:all .2s;
}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);box-shadow:0 0 0 3px rgba(26,86,219,.25)}

.btn{
  width:100%;padding:.8rem;margin-top:.5rem;
  background:linear-gradient(135deg,#1a56db,#0e9f6e);
  color:white;border:none;border-radius:10px;
  font-size:.95rem;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all .2s;position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:white;opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:.08}
.btn:active{transform:scale(.98)}

.divider{display:flex;align-items:center;gap:.75rem;margin:1.2rem 0}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.12)}
.divider span{font-size:.75rem;color:rgba(255,255,255,.35)}

.link-row{text-align:center;font-size:.8rem;color:rgba(255,255,255,.45)}
.link-row a{color:rgba(255,255,255,.85);font-weight:500;text-decoration:none;transition:color .2s}
.link-row a:hover{color:white}

/* ── BOTTOM BADGES ── */
.trust-row{display:flex;gap:.6rem;margin-top:1.5rem;justify-content:center}
.badge{display:flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:.3rem .7rem;font-size:.68rem;color:rgba(255,255,255,.5)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#0e9f6e}

@media(max-width:620px){.left{display:none}.right{padding:2rem}}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="floaters" id="floaters"></div>

<div class="shell">
  <div class="card">

    <div class="left">
      <div class="brand">
        <div class="brand-name">Medi<br>Hub</div>
        <div class="brand-sub">Health Intelligence</div>
        <div class="brand-pulse"></div>
      </div>
      <div class="tagline">
        Your complete medical record,<br>
        <strong>always with you.</strong><br><br>
        Secure · Smart · Instant
      </div>
    </div>

    <div class="right">
      <div class="form-wrap">
        <div class="form-title">Welcome back</div>
        <div class="form-hint">Sign in to your health dashboard</div>

        <div class="field">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" autofocus>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>

        <button class="btn" onclick="window.location.href='dashboard.html'">Log in →</button>

        <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>
        <div class="link-row">New to MediHub? <a href="signup.html">Create account</a></div>

        <div class="trust-row">
          <div class="badge"><div class="badge-dot"></div>256-bit encrypted</div>
          <div class="badge"><div class="badge-dot"></div>HIPAA safe</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ── PARTICLE CANVAS ── */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

function Particle(){
  this.reset=function(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.r=Math.random()*2+.5;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;
    this.alpha=Math.random()*.5+.1;
  };this.reset();
}
for(let i=0;i<120;i++){let p=new Particle();particles.push(p)}

function draw(){
  ctx.clearRect(0,0,W,H);
  /* deep space gradient */
  let bg=ctx.createRadialGradient(W*.3,H*.4,0,W*.5,H*.5,Math.max(W,H));
  bg.addColorStop(0,'#0a1f44');bg.addColorStop(.5,'#04152d');bg.addColorStop(1,'#020c1b');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  /* nebula blobs */
  [[W*.15,H*.3,180,'rgba(26,86,219,.12)'],[W*.8,H*.6,220,'rgba(14,159,110,.1)'],[W*.5,H*.2,160,'rgba(79,172,254,.08)']].forEach(([x,y,r,c])=>{
    let g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,c);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });

  /* particles */
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${p.alpha})`;ctx.fill();
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W||p.y<0||p.y>H)p.reset();
  });

  /* connections */
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
      let d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){
        ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(79,172,254,${.15*(1-d/90)})`;ctx.lineWidth=.5;ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();

/* ── FLOATING MEDICAL ICONS ── */
const icons=[
  `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`,
  `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>`,
  `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>`,
  `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>`,
  `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>`,
];
const floaters=document.getElementById('floaters');
for(let i=0;i<18;i++){
  const el=document.createElement('div');
  el.className='floater';
  el.innerHTML=icons[Math.floor(Math.random()*icons.length)];
  el.style.cssText=`left:${Math.random()*100}%;animation-duration:${12+Math.random()*20}s;animation-delay:${Math.random()*-25}s;`;
  floaters.appendChild(el);
}
</script>
</body>
</html>
